<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Granted | The Confinement</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #05070a;
            --card-bg: #0f172a;
            --accent: #007aff;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 440px; padding: 24px; text-align: center; }

        /* Matching the Main Page Title Style */
        .brand-tag {
            display: inline-block;
            background: rgba(0, 122, 255, 0.15);
            color: var(--accent);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        .main-title {
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.05em;
            margin: 0 0 40px 0;
            background: linear-gradient(180deg, #FFFFFF 0%, #94A3B8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 48px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .icon-box {
            width: 64px;
            height: 64px;
            background: rgba(0, 122, 255, 0.1);
            border: 1px solid rgba(0, 122, 255, 0.3);
            color: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 24px auto;
        }

        h2 { font-size: 1.8rem; font-weight: 700; margin: 0 0 12px 0; letter-spacing: -0.02em; }
        p { color: var(--text-dim); line-height: 1.6; margin-bottom: 32px; font-size: 1rem; }

        .join-btn {
            display: block;
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            margin-bottom: 32px;
        }

        .join-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3);
        }

        /* Expert Support Section */
        .support-footer {
            border-top: 1px solid var(--border);
            padding-top: 24px;
        }

        .support-text {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 12px;
        }

        .expert-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 16px;
            border-radius: 100px;
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.08);
            transition: 0.2s;
        }

        .expert-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
        }

        .expert-btn span { color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-tag">Access Verified</div>
    <h1 class="main-title">The<br>Confinement</h1>

    <div class="card">
        <div class="icon-box">✓</div>
        <h2>Payment Successful</h2>
        <p>Verification complete. You are now authorized to join the private consulting group.</p>
        
        <a href="https://t.me/+jSMynmhpvzIxNzRh" class="join-btn">Enter The Confinement</a>

        <div class="support-footer">
            <span class="support-text">Direct Expert Access</span>
            <a href="https://t.me/OVERALLEXPERT" class="expert-btn">
                Contact <span>@OVERALLEXPERT</span>
            </a>
        </div>
    </div>
</div>

</body>
</html>
